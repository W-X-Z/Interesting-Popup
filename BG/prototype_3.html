<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3안 · 이슈 카드 넘기기</title>
<style>
  :root{
    --up:#f04452;
    --down:#3478f6;
    --news:#f59e0b;
    --ink:#191f28;
    --sub:#8b95a1;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    font-family:"Apple SD Gothic Neo","Pretendard","Malgun Gothic",-apple-system,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#1b2330,#0e1116 60%);
    color:#e8edf4;display:flex;flex-direction:column;align-items:center;
    padding:40px 20px 80px;min-height:100vh;
  }
  h1{font-size:18px;font-weight:800;margin:0 0 4px;letter-spacing:-.3px;}
  .lede{color:#9aa6b5;font-size:13px;margin:0 0 26px;text-align:center;}

  /* ---- phone frame ---- */
  .frame{
    width:386px;height:836px;overflow:hidden;border-radius:38px;
    box-shadow:0 24px 60px rgba(0,0,0,.55),0 2px 0 rgba(255,255,255,.04) inset;
    position:relative;background:#000;
  }
  .phone{
    width:540px;height:1170px;transform:scale(.715);transform-origin:0 0;
    position:relative;
    background-image:url("assets/popup.png");
    background-size:540px 1170px;background-repeat:no-repeat;
  }
  .viewport{
    position:absolute;left:197px;top:245px;width:343px;height:706px;
    overflow-y:auto;overflow-x:hidden;background:#fff;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .viewport::-webkit-scrollbar{display:none;}
  .seg{display:block;width:343px;}
  .widget{width:343px;background:#fff;padding:12px 16px 16px;}

  /* ---- carousel ---- */
  .caro{position:relative;}
  .caro-win{overflow:hidden;border-radius:18px;}
  .caro-track{display:flex;}
  .slide{
    flex:0 0 100%;padding:18px;border-radius:18px;color:#fff;min-height:188px;
    display:flex;flex-direction:column;cursor:pointer;position:relative;overflow:hidden;
  }
  .slide.up{background:linear-gradient(135deg,#ff5a6a,#df2c3c);}
  .slide.down{background:linear-gradient(135deg,#5a93ff,#2a5fe0);}
  .slide.news{background:linear-gradient(135deg,#ffbb44,#ef8a0a);}
  .badge{
    align-self:flex-start;font-size:12px;font-weight:800;letter-spacing:.2px;
    background:rgba(255,255,255,.22);padding:4px 11px;border-radius:999px;
  }
  .slide .title{font-size:18px;font-weight:800;line-height:1.4;letter-spacing:-.4px;margin-top:14px;}
  .slide .body{font-size:13.5px;line-height:1.6;opacity:.96;margin-top:10px;flex:1;}
  .slide .time{font-size:11px;opacity:.78;margin-top:14px;}

  .dots{display:flex;gap:7px;justify-content:center;margin-top:14px;}
  .dot{width:7px;height:7px;border-radius:50%;background:#d6dbe2;transition:.22s;cursor:pointer;}
  .dot.on{width:20px;border-radius:4px;background:var(--ink);}

  /* ---- onboarding (1회) ---- */
  .coach{
    position:absolute;inset:0;border-radius:18px;
    background:rgba(20,24,31,.62);backdrop-filter:blur(1px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    color:#fff;cursor:pointer;z-index:5;animation:fade .25s ease;
  }
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .coach .hand{font-size:34px;animation:nudge 1.15s ease-in-out infinite;}
  @keyframes nudge{0%,100%{transform:translateX(8px)}50%{transform:translateX(-8px)}}
  .coach .msg{font-size:14px;font-weight:700;letter-spacing:-.2px;}
  .coach .sub{font-size:11.5px;opacity:.8;margin-top:-6px;}

  /* ---- test 버튼 ---- */
  .testbar{margin-top:22px;display:flex;gap:10px;}
  .testbtn{
    background:#1b2330;color:#aebccd;border:1px solid #2b3a4d;border-radius:10px;
    padding:9px 16px;font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s;
  }
  .testbtn:hover{background:#243047;color:#dce6f2;}
  .testnote{margin-top:10px;color:#5d6b7d;font-size:11px;}
</style>
</head>
<body>
  <h1>3안 · 이슈 카드 넘기기</h1>
  <p class="lede">카드를 탭하면 다음 이슈로 넘어갑니다. (첫 진입 시 안내 1회 노출)</p>

  <div class="frame"><div class="phone"><div class="viewport">
    <img class="seg" src="assets/tobe_top.png" alt="">
    <div class="widget">
      <div class="caro">
        <div class="caro-win"><div class="caro-track" id="track"></div></div>
        <div class="dots" id="dots"></div>
      </div>
    </div>
    <img class="seg" src="assets/tobe_bottom.png" alt="">
  </div></div></div>

  <div class="testbar">
    <button class="testbtn" id="replayCoach">🔁 코치마크 다시 보기 (test)</button>
  </div>
  <div class="testnote">* 실제 배포 시 제거 · 온보딩은 사용자당 최초 1회만 노출됩니다</div>

<script>
const ISSUES = [
  {k:'up',  tag:'호재', title:'엔비디아, HBM4 조기 양산 요청',
    body:'차세대 AI 가속기용 HBM4 공급 일정을 앞당겨 달라는 요청이 들어오며 선점 효과가 부각됐습니다.', time:'6시간 전'},
  {k:'down',tag:'악재', title:'메모리 현물가 단기 조정',
    body:'급등 후 D램 현물가가 소폭 되돌림. 단기 과열 부담에 차익실현 매물이 출회되고 있습니다.', time:'3시간 전'},
  {k:'news',tag:'소식', title:'3분기 실적발표 D-12',
    body:'시장 컨센서스 영업이익 9.2조원. HBM 비중 확대에 따른 믹스 개선 폭이 관전 포인트입니다.', time:'9시간 전'},
  {k:'up',  tag:'호재', title:'외국인 5거래일 연속 순매수',
    body:'외국인이 누적 2,400억원을 순매수하며 AI 반도체 비중을 빠르게 늘리고 있습니다.', time:'1시간 전'},
];

const TRANSITION='transform .34s cubic-bezier(.4,0,.2,1)';
const track=document.getElementById('track');
const dots=document.getElementById('dots');
const N=ISSUES.length;
let pos=0;          // 0..N (N = 첫 카드 클론)
let locked=false;   // 스냅 중 중복 입력 방지

function buildSlide(it){
  const s=document.createElement('div');
  s.className='slide '+it.k;
  s.innerHTML=`<span class="badge">${it.tag}</span>
    <div class="title">${it.title}</div>
    <div class="body">${it.body}</div>
    <div class="time">${it.time}</div>`;
  s.addEventListener('click',()=>next());
  return s;
}

// 실제 카드 N개 + 첫 카드 클론 1개(끝에 추가) → 오른쪽으로 자연스럽게 순환
ISSUES.forEach(it=>track.appendChild(buildSlide(it)));
track.appendChild(buildSlide(ISSUES[0]));
track.style.transition=TRANSITION;

ISSUES.forEach((_,i)=>{
  const d=document.createElement('span');
  d.className='dot'+(i===0?' on':'');
  d.addEventListener('click',(e)=>{e.stopPropagation();jump(i);});
  dots.appendChild(d);
});

function setDots(active){
  [...dots.children].forEach((d,i)=>d.classList.toggle('on',i===active));
}

function render(){ track.style.transform=`translateX(${-pos*100}%)`; }

function next(){
  if(locked) return;
  pos+=1;
  render();
  setDots(pos % N);          // 클론(pos===N)이면 첫 도트 활성화
  if(pos===N){               // 클론 도달 → 전환 끝나면 진짜 첫 카드로 무애니메이션 스냅
    locked=true;
    track.addEventListener('transitionend',()=>{
      track.style.transition='none';
      pos=0;
      render();
      void track.offsetWidth; // reflow로 트랜지션 재활성화
      track.style.transition=TRANSITION;
      locked=false;
    },{once:true});
  }
}

function jump(i){           // 도트 직접 선택
  if(locked) return;
  pos=i;
  render();
  setDots(i);
}

/* ---------- 온보딩(최초 1회) ---------- */
const caro=document.querySelector('.caro');
function showCoach(){
  if(document.getElementById('coach')) return;
  const c=document.createElement('div');
  c.className='coach';c.id='coach';
  c.innerHTML=`<div class="hand">👆</div>
    <div class="msg">탭하면 다음 이슈로 넘어가요</div>
    <div class="sub">화면을 한 번 눌러보세요</div>`;
  c.addEventListener('click',()=>{
    c.style.opacity='0';
    setTimeout(()=>c.remove(),200);
    localStorage.setItem('issueCoachSeen','1');
    next();
  });
  caro.appendChild(c);
}
if(!localStorage.getItem('issueCoachSeen')) showCoach();

/* ---------- test: 코치마크 다시 보기 ---------- */
document.getElementById('replayCoach').addEventListener('click',()=>{
  localStorage.removeItem('issueCoachSeen');
  showCoach();
});
</script>
</body>
</html>
