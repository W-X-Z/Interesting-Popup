<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>관심그룹 팝업 · 이슈 콘텐츠 프로토타입</title>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;
    font-family:"Apple SD Gothic Neo","Pretendard","Malgun Gothic",-apple-system,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#1b2330,#0e1116 60%);
    color:#e8edf4;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 20px;text-align:center;
  }
  h1{font-size:22px;font-weight:800;margin:0 0 8px;letter-spacing:-.4px;}
  p{color:#9aa6b5;font-size:14px;margin:0 0 32px;}
  .cards{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}
  a.card{
    display:block;width:260px;text-decoration:none;color:inherit;
    background:#151c27;border:1px solid #26323f;border-radius:18px;padding:24px;
    transition:.18s;
  }
  a.card:hover{transform:translateY(-3px);border-color:#3a86ff;background:#18212e;}
  a.card .pill{display:inline-block;font-size:12px;font-weight:800;color:#fff;
    background:#2b6cff;border-radius:8px;padding:3px 10px;margin-bottom:14px;}
  a.card h2{font-size:16px;font-weight:800;margin:0 0 6px;}
  a.card span{font-size:12.5px;color:#8b95a1;line-height:1.5;}
  .foot{margin-top:30px;font-size:12px;color:#5d6b7d;}
</style>
</head>
<body>
  <h1>관심그룹 팝업 · 이슈 콘텐츠 인터랙션</h1>
  <p>새 이슈 콘텐츠 영역 프로토타입</p>
  <div class="cards">
    <a class="card" href="BG/prototype_3.html">
      <span class="pill">추천 · 3안</span>
      <h2>이슈 카드 넘기기</h2>
      <span>탭하면 호재·악재·소식 카드가 넘어가는 캐러셀 (온보딩 1회 포함)</span>
    </a>
    <a class="card" href="BG/prototype.html">
      <span class="pill">전체 비교</span>
      <h2>5개 안 모아보기</h2>
      <span>1~5안 인터랙션 시안을 한 화면에서 비교</span>
    </a>
  </div>
  <div class="foot">Interesting-Popup · prototype</div>
</body>
</html>
